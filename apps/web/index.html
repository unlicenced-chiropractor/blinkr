<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Blinkr — fast, modern text messaging" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet" />
    <title>Blinkr</title>
    <script>
      (function () {
        var mode = localStorage.getItem('blinkr-theme') || 'dark';
        var aesthetic = localStorage.getItem('blinkr-aesthetic') || 'default';
        var forcedLight = ['frutiger-aero','neumorphic','beach-day','xp-luna','strawberry-milk'];
        var forcedDark = ['hacker','space','retro-crt','sunset','arctic-aurora','rainforest'];
        var dark = mode === 'dark' || (mode === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
        if (forcedLight.indexOf(aesthetic) >= 0) dark = false;
        if (forcedDark.indexOf(aesthetic) >= 0) dark = true;
        document.documentElement.dataset.aesthetic = aesthetic;
        try {
          var raw = localStorage.getItem('blinkr-aesthetic-vars');
          if (raw) {
            var vars = JSON.parse(raw);
            for (var k in vars) document.documentElement.style.setProperty(k, vars[k]);
          }
        } catch (e) {}
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

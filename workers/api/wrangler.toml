name = "blinkr"
main = "src/index.ts"
compatibility_date = "2025-04-01"
workers_dev = true

# Custom domain (production only — beta must use routes = [] below)
[[routes]]
pattern = "blinkr.sortedsheep.org"
custom_domain = true

[assets]
directory = "../../apps/web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[vars]
ENVIRONMENT = "production"
B2_BUCKET_NAME = "blinkr-media"
B2_BUCKET_ID = "87d98288ebb6bae191e10610"

[[d1_databases]]
binding = "DB"
database_name = "blinkr-db"
database_id = "cfe5b9dc-9381-4779-8b95-75870116fa9e"

[durable_objects]
bindings = [
  { name = "CHAT_ROOM", class_name = "ChatRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

[dev]
port = 8787

# Beta worker — same D1/B2, workers.dev only (must NOT inherit production routes).
[env.beta]
name = "blinkr-beta"
workers_dev = true
routes = []

[env.beta.vars]
ENVIRONMENT = "beta"
B2_BUCKET_NAME = "blinkr-media"
B2_BUCKET_ID = "87d98288ebb6bae191e10610"
MEDIA_FALLBACK_ORIGIN = "https://blinkr.sortedsheep.org"

[env.beta.assets]
directory = "../../apps/web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[env.beta.d1_databases]]
binding = "DB"
database_name = "blinkr-db"
database_id = "cfe5b9dc-9381-4779-8b95-75870116fa9e"

[env.beta.durable_objects]
bindings = [
  { name = "CHAT_ROOM", class_name = "ChatRoom" }
]

[[env.beta.migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

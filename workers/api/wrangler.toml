name = "blinkr-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "blinkr-db"
database_id = "local-dev-placeholder"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "blinkr-images"

[durable_objects]
bindings = [
  { name = "CHAT_ROOM", class_name = "ChatRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]

[dev]
port = 8787

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve public URLs
        run: |
          URL="${{ vars.BLINKR_PUBLIC_URL }}"
          if [ -z "$URL" ]; then URL="https://blinkr.sortedsh.workers.dev"; fi
          echo "BLINKR_PUBLIC_URL=$URL" >> "$GITHUB_ENV"
          echo "BLINKR_WS_URL=${URL/https:/wss:}/ws" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build website
        env:
          VITE_API_URL: ${{ env.BLINKR_PUBLIC_URL }}
          VITE_WS_URL: ${{ env.BLINKR_WS_URL }}
        run: npm run build:production -w @blinkr/web

      - name: Apply D1 migrations
        working-directory: workers/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply blinkr-db --remote

      - name: Deploy Worker
        id: deploy
        working-directory: workers/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Verify deployment
        run: |
          curl -sf -o /dev/null "$BLINKR_PUBLIC_URL/"
          curl -sf -o /dev/null -H "Accept: application/json" \
            -w "%{http_code}" "$BLINKR_PUBLIC_URL/auth/me" | grep -qE '401|403'

      - name: Summary
        run: |
          echo "### Blinkr deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** $BLINKR_PUBLIC_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **WebSocket:** $BLINKR_WS_URL" >> "$GITHUB_STEP_SUMMARY"

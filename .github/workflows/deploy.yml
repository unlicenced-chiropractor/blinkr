name: Deploy API & Website

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BLINKR_API_URL: https://blinkr.sortedsh.workers.dev
  BLINKR_WS_URL: wss://blinkr.sortedsh.workers.dev/ws

jobs:
  deploy:
    name: Deploy Cloudflare Worker (API + website)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        env:
          VITE_API_URL: ${{ env.BLINKR_API_URL }}
          VITE_WS_URL: ${{ env.BLINKR_WS_URL }}
        run: npm run build:production -w @blinkr/web

      - name: Apply D1 migrations
        working-directory: workers/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply blinkr-db --remote

      - name: Deploy Worker
        working-directory: workers/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
